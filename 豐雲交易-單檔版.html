<style>
/* ── 台灣股市顏色：漲=紅 跌=綠 ── */
:root{
  --bg:#0d0d0d;--card:#1a1a1a;--card2:#111111;--border:#242424;
  --orange:#e8a032;--up:#e03030;--down:#22c55e;
  --text:#f0f0f0;--muted:#8a8a8a;--dim:#404040;--blue:#4d7ef5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#000;overflow:hidden;}
body{font-family:-apple-system,'PingFang TC','Noto Sans TC',sans-serif;font-size:14px;}

#app{
  max-width:430px;margin:0 auto;height:100%;
  display:flex;flex-direction:column;background:var(--bg);
  position:relative;overflow:hidden;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

/* ─── TOP NAV ─── */
#top-nav{
  background:var(--bg);padding:8px 14px 0;
  display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:50px;
}
.avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  border:1.5px solid #555;background:transparent;
}
.avatar.white-bg{background:#fff;border-color:#fff;}
.avatar-text{font-size:13px;font-weight:800;color:#fff;}
.avatar.white-bg .avatar-text{color:#000;}

.cat-tabs{display:flex;gap:0;flex:1;height:100%;align-items:flex-end;}
.cat-tab{
  background:none;border:none;cursor:pointer;padding:6px 14px 9px;
  font-size:14px;font-weight:400;color:var(--muted);
  border-bottom:2px solid transparent;font-family:inherit;
  white-space:nowrap;position:relative;
}
.cat-tab.active{color:var(--orange);font-weight:700;border-bottom-color:var(--orange);}
.nav-right{display:flex;gap:14px;align-items:center;margin-left:auto;padding-bottom:8px;}
.ico-btn{background:none;border:none;cursor:pointer;padding:2px;position:relative;}
.notif-badge{
  position:absolute;top:-4px;right:-6px;
  background:var(--up);color:#fff;border-radius:9px;
  font-size:9px;font-weight:700;padding:1px 4px;min-width:16px;text-align:center;
  line-height:1.4;
}

/* ─── MARKET BAR ─── */
#mbar{
  background:var(--bg);padding:5px 14px 6px;
  display:flex;align-items:center;gap:5px;font-size:12.5px;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.mb-label{color:var(--muted);}
.mb-val{color:var(--text);font-weight:600;margin:0 2px;}
.mb-dot{color:var(--dim);margin:0 8px;}
.mb-expand{margin-left:auto;background:none;border:none;cursor:pointer;padding:0;}

/* ─── SCREENS ─── */
#screens{flex:1;position:relative;overflow:hidden;}
.screen{display:none;position:absolute;inset:0;overflow-y:auto;padding-bottom:82px;}
.screen.active{display:block;}

/* ─── BOTTOM NAV ─── */
#bnav{
  background:var(--card);border-top:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:flex-end;
  padding-bottom:max(8px,env(safe-area-inset-bottom));
  padding-top:6px;position:relative;z-index:10;
}
.bn-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;cursor:pointer;padding:4px 0;font-family:inherit;
}
.bn-btn span{font-size:10px;color:var(--muted);}
.bn-btn.active span{color:var(--up);}
.bn-order{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;background:none;border:none;}
.bn-order-circle{
  width:58px;height:58px;background:var(--up);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin-top:-24px;border:3px solid var(--bg);
  box-shadow:0 -2px 12px rgba(224,48,48,.4);
}
.bn-order span{font-size:10px;color:var(--up);font-weight:700;margin-top:1px;}

/* ─── OVERVIEW ─── */
.ann-banner{
  background:#1e1500;border-left:3px solid #c8820a;
  margin:8px 12px;padding:9px 12px;
  display:flex;justify-content:space-between;align-items:center;gap:8px;
}
.ann-text{font-size:12.5px;color:#d4950f;flex:1;}
.ann-x{background:none;border:none;cursor:pointer;color:#c8820a;font-size:18px;padding:0;line-height:1;}

.acct-row{padding:7px 14px;display:flex;justify-content:space-between;align-items:center;}
.acct-info{font-size:13px;color:var(--muted);}
.btn-upd{
  background:#2a2a2a;border:none;cursor:pointer;
  border-radius:5px;padding:4px 14px;font-size:12px;color:var(--text);font-family:inherit;
}

/* Portfolio summary block */
.port-block{margin:0 12px 12px;padding:14px;}
.port-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.port-title{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.port-badges{display:flex;gap:8px;align-items:center;}
.badge-blue{
  font-size:11px;color:var(--blue);
  border:1px solid var(--blue);border-radius:4px;
  padding:2px 6px;display:flex;align-items:center;gap:3px;
}
.port-total{font-size:22px;font-weight:700;color:var(--text);margin:8px 0 12px;}
.port-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.pgrid-cell{background:var(--card2);border-radius:8px;padding:11px 12px;}
.pgrid-cell-inner{display:flex;gap:16px;}
.pgrid-item{flex:1;}
.pgrid-label{font-size:11px;color:var(--muted);margin-bottom:4px;line-height:1.4;}
.pgrid-val{font-size:18px;font-weight:700;color:var(--orange);}
.pgrid-val-muted{font-size:14px;color:var(--muted);}
.pgrid-val-dash{font-size:18px;color:var(--text);}

/* Quick actions */
.qa-section{margin:0 12px 12px;padding:16px 14px;}
.qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.qa-item{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;}
.qa-icon{
  width:52px;height:52px;border-radius:26px;background:#1e1e1e;
  display:flex;align-items:center;justify-content:center;
}
.qa-label{font-size:11.5px;color:var(--text);text-align:center;line-height:1.3;}
.qa-divider{height:14px;}
.dots-row{display:flex;justify-content:center;gap:5px;margin-top:14px;}
.dot{height:5px;border-radius:3px;}
.dot.a{background:var(--orange);width:16px;}
.dot:not(.a){background:var(--dim);width:6px;}

/* Promo cards */
.promo-row{display:flex;gap:0;padding:0;overflow-x:auto;}
.promo-row::-webkit-scrollbar{display:none;}
.promo-card{min-width:calc(50% - 6px);background:var(--card);padding:14px;flex-shrink:0;}
.promo-card:first-child{border-radius:0;margin-right:2px;}
.promo-card:last-child{border-radius:0;}
.promo-card.dark-amber{background:#1a1200;}

/* ─── SELECTION / CHART ─── */
.idx-summary{padding:12px 14px 0;display:flex;align-items:flex-start;gap:8px;}
.idx-main{flex:1;}
.idx-name-sm{font-size:12px;color:var(--muted);margin-bottom:2px;}
.idx-val-lg{font-size:28px;font-weight:800;color:var(--text);line-height:1.1;}
.idx-chg-row{font-size:13px;margin-top:3px;}
.idx-side-info{font-size:11px;color:var(--muted);line-height:1.9;text-align:right;}
.idx-side2{text-align:right;flex-shrink:0;}

.chart-section{padding:8px 14px 6px;}
.chart-wrap{display:flex;gap:4px;}
.chart-ylabels{
  display:flex;flex-direction:column;justify-content:space-between;
  padding-right:4px;font-size:9px;color:var(--muted);height:200px;
  align-items:flex-end;flex-shrink:0;width:40px;
}
.chart-canvas-wrap{flex:1;position:relative;}
#chart-main{display:block;width:100%;height:200px;}
.chart-legend{
  display:flex;flex-direction:column;gap:20px;flex-shrink:0;
  justify-content:center;padding-left:6px;
}
.legend-item{display:flex;flex-direction:column;align-items:center;gap:3px;}
.legend-line{width:18px;height:2px;}
.legend-label{font-size:8px;color:var(--muted);text-align:center;line-height:1.3;}
.chart-vol-row{display:flex;gap:4px;margin-top:3px;}
.vol-spacer{width:44px;flex-shrink:0;}
#chart-vol{display:block;width:100%;height:28px;}
.chart-times{
  display:flex;justify-content:space-between;
  margin-top:3px;font-size:9px;color:var(--muted);
  padding-left:44px;padding-right:52px;
}

.sub-idx-row{display:flex;gap:6px;padding:4px 12px 8px;overflow-x:auto;}
.sub-idx-row::-webkit-scrollbar{display:none;}
.si-card{min-width:118px;background:var(--card);border-radius:8px;padding:10px 12px;flex-shrink:0;}
.si-name{font-size:11px;color:var(--muted);margin-bottom:3px;}
.si-val{font-size:18px;font-weight:700;}
.si-chg{font-size:11px;margin-top:2px;}

.qf-section{margin:0 12px 12px;padding:14px;}
.qf-hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.qf-bar{width:18px;height:16px;background:var(--dim);border-radius:3px;display:flex;align-items:center;justify-content:center;}
.qf-title{font-size:14px;font-weight:700;color:var(--text);}

/* ─── HOLDINGS (自選) ─── */
.sub-tabs{display:flex;border-bottom:1px solid var(--border);}
.sub-tab{
  background:none;border:none;cursor:pointer;
  padding:10px 14px;font-size:14px;color:var(--muted);
  border-bottom:2px solid transparent;font-family:inherit;margin-bottom:-1px;
  white-space:nowrap;
}
.sub-tab.active{color:var(--orange);font-weight:700;border-bottom-color:var(--orange);}
.sub-tab-settings{margin-left:auto;padding:10px 14px;background:none;border:none;cursor:pointer;}

.hold-controls{padding:8px 14px;display:flex;justify-content:space-between;align-items:center;}
.hold-show{display:flex;gap:6px;align-items:center;font-size:13px;color:var(--muted);}
.pnl-bar{
  padding:8px 14px 12px;display:flex;gap:24px;
  border-bottom:1px solid var(--border);align-items:flex-end;
}
.pnl-item{display:flex;flex-direction:column;gap:3px;}
.pnl-label{font-size:11px;color:var(--muted);}
.pnl-val{font-size:17px;color:var(--text);}
.toggle-grp{margin-left:auto;display:flex;align-items:center;gap:7px;}
.toggle-lbl{font-size:11px;color:var(--muted);}
.toggle-wrap{width:44px;height:24px;border-radius:12px;background:#444;position:relative;cursor:pointer;transition:.2s;}
.toggle-wrap.on{background:var(--orange);}
.toggle-knob{width:20px;height:20px;border-radius:50%;background:#eee;position:absolute;top:2px;right:2px;transition:.2s;}
.toggle-wrap:not(.on) .toggle-knob{right:22px;}

.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:70px 20px 40px;
}
.empty-illus{
  width:88px;height:88px;background:#1e1e1e;border-radius:10px;
  display:flex;align-items:center;justify-content:center;margin-bottom:14px;
}
.empty-txt{font-size:15px;color:var(--muted);margin-bottom:5px;}
.empty-sub{font-size:12px;color:var(--dim);}

.stock-row{
  padding:13px 14px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;cursor:pointer;
}
.stock-row:active{background:rgba(255,255,255,.04);}
.s-code{font-size:15px;font-weight:700;color:var(--text);}
.s-name{font-size:12px;color:var(--muted);margin-top:2px;}
.s-price{font-size:16px;font-weight:700;text-align:right;}
.s-chg{font-size:12px;text-align:right;margin-top:2px;}

/* ─── OVERSEAS ─── */
.filter-row{display:flex;gap:8px;padding:8px 14px;align-items:center;}
.filter-pill{
  background:#202020;border:none;cursor:pointer;border-radius:20px;
  padding:5px 13px;font-size:12.5px;color:var(--text);
  display:flex;align-items:center;gap:5px;font-family:inherit;
}
.settle-row{
  margin:0 12px 10px;background:var(--card);border-radius:8px;
  padding:13px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;
}
.news-tabs-bar{display:flex;border-bottom:1px solid var(--border);}
.ntab{
  flex:1;background:none;border:none;cursor:pointer;
  padding:12px 0;font-size:13.5px;color:var(--muted);
  border-bottom:2px solid transparent;font-family:inherit;margin-bottom:-1px;
}
.ntab.active{color:var(--orange);font-weight:700;border-bottom-color:var(--orange);}
.news-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;}
.news-item:active{background:rgba(255,255,255,.04);}
.news-time{font-size:10px;color:var(--dim);margin-bottom:3px;}
.news-ttl{font-size:13px;color:var(--text);line-height:1.5;}

/* ─── OPTIONS ─── */
.opt-banner{
  margin:12px;background:linear-gradient(140deg,#1b2d50,#0e1b32);
  border-radius:12px;padding:22px 18px;position:relative;overflow:hidden;
}
.opt-title{font-size:22px;font-weight:800;color:#fff;line-height:1.4;margin-bottom:14px;}
.opt-check{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.opt-open-btn{
  width:100%;background:#2b5be3;border:none;cursor:pointer;
  border-radius:8px;padding:13px;font-size:14px;font-weight:700;
  color:#fff;margin-top:14px;font-family:inherit;
}
.opt-figure{position:absolute;right:12px;top:12px;font-size:56px;opacity:.9;}

/* ─── ACCOUNT ─── */
.total-row{
  padding:10px 14px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);
}
.total-left{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);}
.total-right{display:flex;align-items:center;gap:5px;font-size:15px;font-weight:700;color:var(--text);}

.pc-card{margin:6px 12px;background:var(--card);border-radius:10px;padding:14px;cursor:pointer;}
.pc-card:active{background:#202020;}
.pc-top{display:flex;justify-content:space-between;margin-bottom:8px;}
.pc-id{font-size:12px;color:var(--muted);}
.pc-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.pc-label-txt{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--text);}
.pc-val-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.pc-cur{font-size:18px;font-weight:700;color:var(--text);}
.pc-dash{height:2px;width:28px;background:var(--dim);}
.pc-stats{display:grid;grid-template-columns:repeat(3,1fr);}
.pc-stat{text-align:center;}
.pc-stat-lbl{font-size:11px;color:var(--dim);}
.pc-stat-val{font-size:12px;color:var(--muted);margin-top:3px;}

/* ─── ACCOUNT DETAIL ─── */
.detail-hdr{
  padding:10px 14px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
}
.back-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--text);font-size:22px;line-height:1;}
.detail-title{font-size:16px;font-weight:700;color:var(--text);}
.detail-sub{font-size:12px;color:var(--muted);}

.detail-card{margin:8px 12px 6px;background:var(--card);border-radius:10px;padding:14px;}
.dc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.dc-title{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);}
.dc-cur-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.dc-cur{font-size:20px;font-weight:700;color:var(--text);}
.dc-line{height:2px;width:28px;background:var(--dim);}
.dc-stats{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border);padding-top:10px;}
.dc-stat{text-align:center;}
.dc-stat-lbl{font-size:11px;color:var(--muted);margin-bottom:3px;}
.dc-stat-val{font-size:12px;color:var(--text);}

.menu-row{
  margin:2px 12px;background:var(--card);border-radius:8px;
  padding:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;
}
.menu-row:active{background:#202020;}
.menu-lbl{font-size:14px;color:var(--text);}
.menu-val{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.menu-val.orange{color:var(--orange);}

/* ─── FUND ─── */
.fund-banner{
  margin:12px;background:linear-gradient(155deg,#1c0f00,#0e0900);
  border-radius:12px;padding:24px 18px;position:relative;overflow:hidden;min-height:330px;
}
.fund-tag{font-size:24px;font-weight:900;color:var(--orange);}
.fund-ttl{font-size:24px;font-weight:900;color:#fff;line-height:1.3;margin:6px 0 8px;}
.fund-sub{color:var(--orange);font-size:13px;margin-bottom:20px;}
.fund-stat{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.fund-stat-bar{width:4px;height:34px;background:var(--orange);border-radius:2px;flex-shrink:0;}
.fund-num{font-size:30px;font-weight:900;color:var(--orange);line-height:1;}
.fund-unit{font-size:14px;color:var(--muted);}
.fund-desc{font-size:13px;color:var(--text);margin-top:2px;}
.fund-exp-btn{
  position:absolute;top:22px;right:14px;background:var(--up);
  border:none;border-radius:24px;padding:10px 16px;
  font-size:14px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;
}
.fund-cards-row{display:flex;gap:8px;padding:4px 12px 12px;overflow-x:auto;}
.fund-cards-row::-webkit-scrollbar{display:none;}
.fund-mini-card{min-width:150px;background:var(--card);border-radius:10px;padding:12px;flex-shrink:0;}
.fund-mc-lbl{font-size:11px;color:var(--dim);margin-bottom:4px;}
.fund-mc-name{font-size:12px;color:var(--text);font-weight:600;line-height:1.4;}
.fund-mc-ret{font-size:16px;font-weight:700;color:var(--up);margin-top:7px;}

/* ─── ORDER OVERLAY ─── */
#ov-order{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);
  z-index:100;flex-direction:column;justify-content:flex-end;align-items:center;
}
#ov-order.open{display:flex;}
.order-sheet{
  background:var(--card);border-radius:20px 20px 0 0;padding:18px 16px 34px;
  width:100%;max-width:430px;max-height:92vh;overflow-y:auto;
}
.order-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.order-title{font-size:16px;font-weight:700;color:var(--text);}
.order-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--muted);line-height:1;}
.bs-row{display:flex;background:#0a0a0a;border-radius:8px;margin-bottom:14px;overflow:hidden;}
.bs-btn{flex:1;border:none;cursor:pointer;padding:10px;font-size:14px;font-weight:700;font-family:inherit;}
.bs-btn.buy{background:var(--up);color:#fff;}
.bs-btn.sell{background:var(--down);color:#fff;}
.bs-btn.off{background:transparent;color:var(--dim);}
.field{margin-bottom:12px;}
.field-lbl{font-size:11px;color:var(--muted);margin-bottom:5px;}
.field-box{
  background:#0f0f0f;border-radius:8px;padding:11px 13px;
  display:flex;justify-content:space-between;align-items:center;cursor:pointer;
}
.field-val{font-size:14px;color:var(--text);}
.field-hint{font-size:11px;color:var(--muted);}
.field-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.qty-btns{display:flex;gap:7px;}
.qty-btn{
  width:27px;height:27px;background:none;border:1px solid var(--border);
  border-radius:5px;color:var(--text);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:inherit;
}
.price-types{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.pt-btn{
  background:#0f0f0f;border:1px solid var(--border);border-radius:6px;
  padding:5px 12px;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit;
}
.pt-btn.active{border-color:var(--orange);color:var(--orange);background:#1e1500;}
.est-row{
  background:#0f0f0f;border-radius:8px;padding:11px 13px;
  display:flex;justify-content:space-between;margin-bottom:14px;
}
.est-lbl{font-size:13px;color:var(--muted);}
.est-val{font-size:14px;font-weight:700;color:var(--text);}
.submit-btn{
  width:100%;border:none;cursor:pointer;border-radius:10px;
  padding:14px;font-size:16px;font-weight:800;color:#fff;font-family:inherit;
}

/* ─── SEARCH OVERLAY ─── */
#ov-search{
  display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;
}
#ov-search.open{display:flex;}
.search-hdr{
  padding:12px 14px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
}
.search-inp{
  flex:1;background:#222;border:none;border-radius:8px;
  padding:9px 12px;font-size:15px;color:var(--text);outline:none;font-family:inherit;
}
.search-inp::placeholder{color:var(--muted);}
.search-cancel{background:none;border:none;cursor:pointer;color:var(--orange);font-size:14px;font-family:inherit;}
.search-body{flex:1;overflow-y:auto;}
.search-sec-ttl{font-size:12px;color:var(--muted);padding:10px 14px 4px;font-weight:600;letter-spacing:.4px;}
.hot-tags{display:flex;flex-wrap:wrap;gap:8px;padding:4px 14px 10px;}
.hot-tag{
  background:#1e1e1e;border:none;border-radius:6px;
  padding:6px 13px;font-size:13px;color:var(--text);cursor:pointer;font-family:inherit;
}
.hot-tag:active{background:#282828;}

/* ─── TOAST ─── */
#toast{
  position:fixed;bottom:104px;left:50%;transform:translateX(-50%) translateY(10px);
  background:rgba(28,28,28,.96);color:var(--text);border:1px solid var(--border);
  padding:10px 22px;border-radius:24px;font-size:13px;
  transition:.25s;opacity:0;z-index:999;pointer-events:none;
  white-space:nowrap;max-width:85%;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ─── MISC ─── */
@keyframes spin{to{transform:rotate(360deg);}}
.ch-sep{height:1px;background:var(--border);margin:0;}
.sec-gap{height:8px;}
.up{color:var(--up);}
.down{color:var(--down);}
.muted{color:var(--muted);}

/* ─── 通知面板 ─── */
#notif-panel{
  position:fixed;top:0;left:0;right:0;max-width:430px;margin:0 auto;
  background:var(--card);border-bottom:1px solid var(--border);
  z-index:150;transform:translateY(-100%);transition:.3s cubic-bezier(.4,0,.2,1);
  max-height:75vh;overflow-y:auto;padding-bottom:16px;
  padding-top:max(44px,env(safe-area-inset-top));
}
#notif-panel.open{transform:translateY(0);}
#notif-backdrop{display:none;position:fixed;inset:0;z-index:140;background:rgba(0,0,0,.5);}
#notif-backdrop.open{display:block;}
.notif-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 16px 6px;}
.notif-title{font-size:16px;font-weight:700;color:var(--text);}
.notif-close{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;}
.notif-sec-title{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.5px;padding:8px 16px 4px;}
.notif-card{background:var(--card2);border-radius:10px;margin:4px 12px;padding:12px 14px;}
.notif-status{display:flex;align-items:center;gap:8px;padding:10px 16px;}
.status-dot{width:8px;height:8px;border-radius:50%;}
.status-dot.open{background:#22c55e;box-shadow:0 0 6px #22c55e;}
.status-dot.closed{background:var(--muted);}
.mover-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.mover-row:last-child{border:none;}
/* ─── 即時更新指示 ─── */
#live-dot{
  width:6px;height:6px;border-radius:50%;background:var(--down);
  display:inline-block;margin-left:4px;animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.market-status-bar{
  background:#0a1228;padding:4px 14px;font-size:11px;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
}
/* ─── 加入庫存按鈕 ─── */
.add-hold-btn{
  background:transparent;border:1px solid var(--orange);
  border-radius:5px;padding:3px 8px;font-size:11px;
  color:var(--orange);cursor:pointer;font-family:inherit;white-space:nowrap;
}
/* ─── 快速加入庫存彈窗 ─── */
#ov-quick-add{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:200;flex-direction:column;justify-content:flex-end;align-items:center;
}
#ov-quick-add.open{display:flex;}

.news3-tab{flex:1;background:none;border:none;cursor:pointer;padding:11px 0;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;font-family:inherit;margin-bottom:-1px;}
.news3-tab.active{color:var(--orange);font-weight:700;border-bottom-color:var(--orange);}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.report-row:active{background:rgba(255,255,255,.04);}
.report-ttl{font-size:15px;font-weight:700;color:var(--text);}
.report-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.group-row{display:flex;gap:8px;padding:8px 12px;}
.group-card{flex:1;background:var(--card);border-radius:8px;padding:10px 12px;cursor:pointer;}
.group-card-title{font-size:12px;color:var(--muted);margin-bottom:6px;}
.group-stock{display:flex;justify-content:space-between;align-items:center;padding:3px 0;}
.group-stock-name{font-size:12px;color:var(--text);}
.group-stock-chg{font-size:12px;font-weight:700;}
.learn-art{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;}
.learn-art:active{background:rgba(255,255,255,.04);}
.learn-art-date{font-size:10px;color:var(--dim);margin-bottom:4px;}
.learn-art-ttl{font-size:13.5px;color:var(--text);line-height:1.5;font-weight:600;}
.learn-art-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;margin-top:6px;font-weight:600;}

/* ── 全頁 Overlay ─── */
.full-page{
  position:fixed;inset:0;max-width:430px;margin:0 auto;
  z-index:300;overflow-y:auto;display:none;flex-direction:column;
}
.full-page.open{display:flex;}
/* 白底（豐存台股） */
.fp-light{background:#f5f5f7;color:#111;}
/* 深色（國際指數/股票抽籤） */
.fp-dark{background:var(--bg);color:var(--text);}
/* 頁頭 */
.fp-header{
  display:flex;align-items:center;padding:10px 14px;gap:10px;
  position:sticky;top:0;z-index:1;
  padding-top:max(10px,env(safe-area-inset-top));
}
.fp-header.light{background:#f5f5f7;border-bottom:1px solid #e0e0e0;}
.fp-header.dark{background:var(--bg);border-bottom:1px solid var(--border);}
.fp-back{background:none;border:none;cursor:pointer;font-size:20px;color:inherit;padding:4px;}
.fp-title{font-size:16px;font-weight:700;flex:1;text-align:center;}
.fp-title-sub{font-size:11px;font-weight:400;opacity:.6;}
.fp-icon{background:none;border:none;cursor:pointer;font-size:18px;padding:4px;}
/* 分類Tab（白底版） */
.cat-filter-row{display:flex;gap:0;padding:8px 12px;overflow-x:auto;background:#f5f5f7;border-bottom:1px solid #e0e0e0;}
.cat-filter-row::-webkit-scrollbar{display:none;}
.cat-f-btn{
  background:#e8e8ea;border:none;border-radius:20px;padding:6px 14px;
  font-size:13px;color:#555;cursor:pointer;margin-right:6px;white-space:nowrap;
  font-family:inherit;flex-shrink:0;
}
.cat-f-btn.active{background:#1a2040;color:#fff;}
/* 股票表 - 白底 */
.fstock-header{
  display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr 44px;
  padding:8px 12px;border-bottom:1px solid #ddd;
  font-size:11px;color:#888;font-weight:600;background:#f5f5f7;
  position:sticky;top:56px;z-index:1;
}
.fstock-row{
  display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr 44px;
  padding:12px;border-bottom:1px solid #efefef;background:#fff;align-items:center;cursor:pointer;
}
.fstock-row:active{background:#f0f0f5;}
.fstock-code{font-size:14px;font-weight:700;color:#111;}
.fstock-name{font-size:11px;color:#888;margin-top:2px;}
.fstock-price{font-size:14px;font-weight:700;color:#e03030;text-align:right;}
.fstock-yield{font-size:13px;color:#333;text-align:right;}
.fstock-ret{font-size:13px;color:#333;text-align:right;}
.buy-btn{
  background:#e03030;color:#fff;border:none;border-radius:5px;
  font-size:13px;font-weight:700;padding:7px 10px;cursor:pointer;font-family:inherit;
}
/* 國際指數 */
.idx-section-title{
  font-size:13px;font-weight:700;color:var(--text);
  padding:12px 14px 6px;display:flex;align-items:center;gap:6px;
}
.idx-section-bar{width:3px;height:16px;background:var(--orange);border-radius:2px;}
.idx-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:13px 14px;border-bottom:1px solid var(--border);cursor:pointer;
}
.idx-row:active{background:rgba(255,255,255,.04);}
.idx-row-left{display:flex;align-items:center;gap:10px;}
.idx-flag{font-size:22px;width:28px;}
.idx-name{font-size:14px;color:var(--text);}
.idx-arrow{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;}
.idx-val-col{text-align:right;}
.idx-big-val{font-size:16px;font-weight:700;}
.idx-chg-val{font-size:12px;margin-top:2px;}
/* 股票抽籤 */
.ipo-tab-row{display:flex;border-bottom:1px solid var(--border);}
.ipo-tab{flex:1;background:none;border:none;cursor:pointer;padding:12px 0;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;font-family:inherit;margin-bottom:-1px;}
.ipo-tab.active{color:var(--orange);font-weight:700;border-bottom-color:var(--orange);}
.ipo-header-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;border-bottom:1px solid var(--border);
}
.ipo-header-left{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;}
.ipo-header-right{font-size:12px;color:var(--up);display:flex;align-items:center;gap:4px;cursor:pointer;}
.ipo-card{background:var(--card);border-radius:10px;margin:8px 12px;overflow:hidden;}
.ipo-card-header{display:flex;align-items:center;gap:10px;padding:12px 14px 8px;}
.ipo-status{border-radius:12px;padding:3px 10px;font-size:11px;font-weight:700;}
.ipo-status.going{background:#1a4ae3;color:#fff;}
.ipo-status.waiting{background:transparent;border:1px solid var(--muted);color:var(--muted);}
.ipo-status.closed{background:#2a2a2a;color:var(--muted);}
.ipo-stock-name{font-size:14px;font-weight:700;color:var(--text);}
.ipo-meta{display:grid;grid-template-columns:1fr 1fr 1fr;padding:0 14px 8px;font-size:12px;color:var(--muted);}
.ipo-meta-val{font-size:13px;color:var(--text);margin-top:2px;}
.ipo-diff-row{
  background:#111;display:flex;justify-content:space-between;align-items:center;
  padding:12px 14px;cursor:pointer;
}
.ipo-diff-label{font-size:13px;color:var(--text);}
.ipo-diff-val{font-size:16px;font-weight:700;color:var(--up);}
.ipo-diff-pct{font-size:14px;color:var(--up);margin-left:4px;}
.ipo-actions{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.ipo-act-btn{
  border:none;cursor:pointer;padding:13px;font-size:14px;font-weight:700;
  font-family:inherit;
}
.ipo-act-btn.secondary{background:#1a2a5a;color:var(--blue);}
.ipo-act-btn.primary{background:#1a4ae3;color:#fff;}
.ipo-act-btn.disabled{background:#1a1a1a;color:var(--muted);cursor:default;}
/* 我的申購空白態 */
.ipo-my-header{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 12px;}
.ipo-my-card{background:var(--card);border-radius:8px;padding:12px;}
.ipo-my-title{font-size:12px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.ipo-my-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:var(--text);}
</style>
</head>

function genIntraday(base, n, vol){
  const a=[base];
  for(let i=1;i<n;i++) a.push(+(a[i-1]+(Math.random()-.52)*vol).toFixed(2));

function drawChart(){
  const canvas=document.getElementById('chart-main');
  if(!canvas) return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth, H=200;
  canvas.width=W*dpr; canvas.height=H*dpr;
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const data=S.intraday, n=data.length;
  const min=Math.min(...data)-80, max=Math.max(...data)+80, rng=max-min;
  const px=(v)=>H-((v-min)/rng)*H, py=(i)=>(i/(n-1))*W;
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){ctx.beginPath();ctx.moveTo(0,H*i/4);ctx.lineTo(W,H*i/4);ctx.stroke();}
  for(let i=0;i<=5;i++){ctx.beginPath();ctx.moveTo(W*i/5,0);ctx.lineTo(W*i/5,H);ctx.stroke();}
  // Prev close dashed
  const pc=41790, pcy=px(pc);
  ctx.setLineDash([4,4]); ctx.strokeStyle='rgba(120,120,120,.5)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,pcy); ctx.lineTo(W,pcy); ctx.stroke(); ctx.setLineDash([]);
  // Area (green because going DOWN in Taiwan = green)
  const pts=data.map((v,i)=>({x:py(i),y:px(v)}));
  ctx.beginPath(); ctx.moveTo(pts[0].x,H);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[n-1].x,H); ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'rgba(34,197,94,.18)'); g.addColorStop(1,'rgba(34,197,94,.01)');
  ctx.fillStyle=g; ctx.fill();
  // Line
  ctx.beginPath(); pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
  ctx.strokeStyle='#22c55e'; ctx.lineWidth=1.6; ctx.lineJoin='round'; ctx.stroke();
  // MA line
  const ma=data.map((_,i)=>{const sl=data.slice(Math.max(0,i-10),i+1);return sl.reduce((a,b)=>a+b,0)/sl.length;});
  ctx.beginPath(); ma.forEach((v,i)=>{const x=py(i),y=px(v);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.strokeStyle='rgba(160,160,160,.6)'; ctx.lineWidth=1; ctx.stroke();
  // Volume
  const vc=document.getElementById('chart-vol');
  if(vc){
    const VW=vc.offsetWidth||W, VH=28;
    vc.width=VW*dpr; vc.height=VH*dpr;
    const vctx=vc.getContext('2d'); vctx.scale(dpr,dpr);
    const bw=VW/n;
    for(let i=0;i<n;i++){
      const h=(Math.random()*.8+.1)*VH;
      vctx.fillStyle=data[i]>=(data[i-1]||data[i])?'rgba(34,197,94,.55)':'rgba(224,48,48,.55)';
      vctx.fillRect(i*bw,VH-h,bw-.5,h);
    }
  }
}

// REAL-TIME UPDATE
// ════════════════════════════════════════════
function updateMarket(){
  const j=s=>(Math.random()-.5)*s*2;
  const idx=S.idx;
  idx.taiex.v=+(idx.taiex.v+j(3)).toFixed(2);
  idx.taiex.d=+(idx.taiex.v-idx.taiex.prev).toFixed(2);
  idx.taiex.p=+(idx.taiex.d/idx.taiex.prev*100).toFixed(2);
  idx.otc.v=+(idx.otc.v+j(0.15)).toFixed(2);
  idx.otc.d=+(idx.otc.v-idx.otc.prev).toFixed(2);
  idx.elec.v=+(idx.elec.v+j(4)).toFixed(2);
  idx.elec.d=+(idx.elec.v-2708.29).toFixed(2);
  idx.fin.v=+(idx.fin.v+j(2)).toFixed(2);
  idx.fin.d=+(idx.fin.v-2559.15).toFixed(2);
  idx.fut.v=+(idx.fut.v+j(3)).toFixed(2);
  idx.fut.d=+(idx.fut.v-41969).toFixed(2);
  S.intraday.push(idx.taiex.v);
  if(S.intraday.length>120) S.intraday.shift();
  // 更新所有股票價格（模擬即時行情）
  S.stocks.forEach(s=>{
    const volatility = s.price > 500 ? 2.0 : s.price > 100 ? 0.5 : 0.1;
    const change = (Math.random()-.505)*volatility;
    s.price = Math.max(0.01, +(s.price+change).toFixed(2));
    const origStock = STOCKS.find(o=>o.code===s.code);
    if(origStock){ s.d = +(s.price - (origStock.price - origStock.d)).toFixed(2); s.p = +(s.d/(origStock.price - origStock.d)*100).toFixed(2); }
  });
  renderMbar();
  // Re-render idx numbers in selection without full redraw
  if(S.tab==='selection' && S.cat.selection==='台股'){
    const t=S.idx.taiex;
    document.querySelector('.idx-val-lg') && (document.querySelector('.idx-val-lg').textContent=fmt(t.v,0));
    requestAnimationFrame(drawChart);
  }
}

// ════════════════════════════════════════════
function loadHoldings(){
  try{ return JSON.parse(localStorage.getItem('myHoldings')||'[]'); }
  catch(e){ return []; }
}
function saveHoldings(h){ localStorage.setItem('myHoldings',JSON.stringify(h)); }

function openAddHolding(){
  document.getElementById('ov-add-holding').classList.add('open');
  document.getElementById('ah-code').value='';
  document.getElementById('ah-name').value='';
  document.getElementById('ah-price').value='';
  document.getElementById('ah-qty').value='1';
}
function closeAddHolding(){ document.getElementById('ov-add-holding').classList.remove('open'); }

function submitAddHolding(){
  const code=document.getElementById('ah-code').value.trim().toUpperCase();
  const name=document.getElementById('ah-name').value.trim();
  const price=parseFloat(document.getElementById('ah-price').value);
  const qty=parseInt(document.getElementById('ah-qty').value);
  if(!code||!price||!qty||isNaN(price)||isNaN(qty)){ showToast('請填寫所有欄位'); return; }
  const holdings=loadHoldings();
  const existing=holdings.findIndex(h=>h.code===code);
  if(existing>=0){ holdings[existing]={code,name:name||code,price,qty}; }
  else { holdings.push({code,name:name||code,price,qty}); }
  saveHoldings(holdings);
  closeAddHolding();
  showToast('✅ 庫存已儲存');
  if(S.tab==='watchlist') renderWatchlist();
}

function deleteHolding(code){
  const holdings=loadHoldings().filter(h=>h.code!==code);
  saveHoldings(holdings);
  showToast('已刪除 '+code);
  if(S.tab==='watchlist') renderWatchlist();
}

function renderMyHoldings(){
  const holdings=loadHoldings();
  if(!holdings.length) return `
    <div class="empty-state">
      <div class="empty-illus">
        <svg width="40" height="36" viewBox="0 0 40 36" fill="none"><rect x="4" y="8" width="32" height="24" rx="3" stroke="var(--dim)" stroke-width="2"/><rect x="4" y="8" width="32" height="6" rx="3" stroke="var(--dim)" stroke-width="2"/></svg>
      </div>
      <div class="empty-txt">尚未設定庫存</div>
      <div class="empty-sub">點下方「＋新增持股」開始設定</div>
    </div>
    <div style="padding:0 14px 16px">
      <button onclick="openAddHolding()" style="width:100%;background:var(--card);border:1px solid var(--dim);border-radius:10px;padding:11px;font-size:13px;color:var(--dim);cursor:pointer;font-family:inherit">＋</button>
    </div>`;

  // Calculate P&L for each holding
  let totalCost=0, totalVal=0;
  const rows=holdings.map(h=>{
    // Find current price from live stocks or use buy price + random
    const live=S.stocks.find(s=>s.code===h.code);
    const curPrice=live?live.price:h.price*(1+(Math.random()-0.4)*0.05);
    const cost=h.price*h.qty*1000;

let _apiTimer = null;
let _lastFetchTime = null;

function isTradingHours(){
  const now = new Date();
  const tw = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
  const day = tw.getDay();
  const min = tw.getHours()*60 + tw.getMinutes();
  return day>=1 && day<=5 && min>=540 && min<=810; // 9:00-13:30
}

function updateMarketStatusBar(){
  const trading = isTradingHours();
  const bar = document.getElementById('market-status-txt');
  const upd = document.getElementById('last-update-txt');
  if(!bar) return;
  if(trading){
    bar.innerHTML = '<span style="color:#22c55e">● 盤中</span> 台灣股市交易中';
  } else {
    const now = new Date();
    const tw = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
    const h = tw.getHours(), m = tw.getMinutes();
    if(tw.getDay()===0||tw.getDay()===6) bar.innerHTML='<span style="color:var(--muted)">● 休市</span> 週末休市';
    else if(h<9) bar.innerHTML='<span style="color:var(--orange)">● 盤前</span> 09:00 開盤';
    else bar.innerHTML='<span style="color:var(--muted)">● 已收盤</span> 今日收盤價';
  }
  if(_lastFetchTime && upd){
    const diff = Math.round((Date.now()-_lastFetchTime)/1000);
    upd.textContent = diff < 60 ? `${diff}秒前更新` : `${Math.round(diff/60)}分前更新`;
  }
}

async function fetchRealTimePrices(){
  // 取前50支股票
  const codes = S.stocks.slice(0,50).map(s=>{
    // 判斷上市/上櫃（簡單規則：代號4位數字且開頭非0→上市，否則依清單）
    return s.code + '.TW';
  });
  const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${codes.join(',')}&lang=zh-TW&region=TW`;
  try {
    const res = await fetch(url, {cache:'no-store'});
    if(!res.ok) return false;
    const data = await res.json();
    const quotes = data?.quoteResponse?.result || [];
    if(!quotes.length) return false;
    quotes.forEach(q=>{
      const code = q.symbol.replace(/\.(TW|TWO)$/,'');
      const st = S.stocks.find(s=>s.code===code);
      if(st && q.regularMarketPrice){
        st.price = Math.round(q.regularMarketPrice*100)/100;
        st.d = Math.round((q.regularMarketChange||0)*100)/100;
        st.p = Math.round((q.regularMarketChangePercent||0)*100)/100;
      }
    });
    _lastFetchTime = Date.now();
    return true;
  } catch(e){ return false; }
}

async function fetchIndexData(){
  // 加權指數 ^TWII, 櫃買指數 ^TWOII
  try {
    const res = await fetch('https://query1.finance.yahoo.com/v7/finance/quote?symbols=%5ETWII,%5ETWOII',{cache:'no-store'});
    if(!res.ok) return;
    const data = await res.json();
    const quotes = data?.quoteResponse?.result||[];
    quotes.forEach(q=>{
      if(q.symbol==='^TWII'){
        S.idx.taiex.v = Math.round(q.regularMarketPrice*100)/100;
        S.idx.taiex.d = Math.round((q.regularMarketChange||0)*100)/100;
        S.idx.taiex.p = Math.round((q.regularMarketChangePercent||0)*100)/100;
      }
      if(q.symbol==='^TWOII'){
        S.idx.otc.v = Math.round(q.regularMarketPrice*100)/100;
        S.idx.otc.d = Math.round((q.regularMarketChange||0)*100)/100;
        S.idx.otc.p = Math.round((q.regularMarketChangePercent||0)*100)/100;
      }
    });
    renderMbar();
  } catch(e){}
}

async function liveUpdate(){
  updateMarketStatusBar();
  if(isTradingHours()){
    const ok = await fetchRealTimePrices();
    await fetchIndexData();
    if(ok){
      updateNotifBadge();
      if(S.tab==='watchlist') renderWatchlist();
    }
  } else {
    // 非交易時間：只更新狀態列，繼續模擬小幅波動讓畫面不死
    S.stocks.forEach(s=>{
      const v=s.price>500?0.5:s.price>100?0.2:0.05;
      s.price=Math.max(0.01,+(s.price+(Math.random()-.5)*v).toFixed(2));
    });
    S.idx.taiex.v=+(S.idx.taiex.v+(Math.random()-.5)*1).toFixed(2);
    renderMbar();
  }
}

function updateNotifBadge(){
  const holdings = loadHoldings();
  let alerts = 0;
  holdings.forEach(h=>{
    const live = S.stocks.find(s=>s.code===h.code);
    if(live && Math.abs(live.p) >= 2) alerts++;
  });
  // 加大盤漲跌超過1%也算一則
  if(Math.abs(S.idx.taiex.p) >= 1) alerts++;
  // 加個股漲停跌停
  const extremes = S.stocks.filter(s=>Math.abs(s.p)>=9).length;
  alerts += extremes;
  const badge = document.getElementById('notif-badge-count');
  if(badge){
    const total = Math.min(99, alerts);
    badge.textContent = total;
    badge.style.display = total > 0 ? 'inline' : 'none';
  }
}

function renderNotifPanel(){

  const sorted = [...S.stocks].sort((a,b)=>b.p-a.p);

  // 持股警報

    if(!live) return null;
    return {...h, curPrice:live.price, chg:live.d, pct:live.p};
  }).filter(Boolean).sort((a,b)=>Math.abs(b.pct)-Math.abs(a.pct));

  let html = `

    <div class="notif-status">
      <div class="status-dot ${trading?'open':'closed'}"></div>
      <span style="font-size:13px;color:var(--text)">${trading?'盤中交易中':'今日已收盤'}</span>

      </span>
    </div>`;

  // 持股警報
  if(holdingAlerts.length){
    html += `<div class="notif-sec-title">📊 持股動態</div><div class="notif-card">`;
    holdingAlerts.slice(0,5).forEach(h=>{
      const pnlTotal = (h.curPrice - h.price)*h.qty*1000;
      html += `<div class="mover-row">
        <div>
          <span style="font-size:14px;font-weight:700;color:var(--text)">${h.code}</span>
          <span style="font-size:12px;color:var(--muted);margin-left:6px">${h.name}</span>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;font-weight:700;color:${h.pct>=0?'var(--up)':'var(--down)'}">${h.pct>=0?'+':''}${h.pct.toFixed(2)}%</div>
          <div style="font-size:11px;color:${pnlTotal>=0?'var(--up)':'var(--down)'}">損益 ${pnlTotal>=0?'+':''}${Math.round(pnlTotal).toLocaleString()}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="notif-sec-title">📊 持股動態</div>
    <div class="notif-card" style="color:var(--muted);font-size:13px;text-align:center;padding:16px">
      尚未設定庫存<br><span style="font-size:12px">到「自選→庫存」新增持股</span>
    </div>`;
  }

  // 漲幅排行
  html += `<div class="notif-sec-title">🔴 漲幅排行</div><div class="notif-card">`;
  top5up.forEach(s=>{
    html += `<div class="mover-row">
      <span style="font-size:13px;color:var(--text)">${s.code} ${s.name}</span>
      <span style="font-size:13px;font-weight:700;color:var(--up)">▲ ${s.p.toFixed(2)}%</span>
    </div>`;
  });
  html += `</div>`;

  // 跌幅排行
  html += `<div class="notif-sec-title">🟢 跌幅排行</div><div class="notif-card">`;
  top5down.forEach(s=>{
    html += `<div class="mover-row">
      <span style="font-size:13px;color:var(--text)">${s.code} ${s.name}</span>
      <span style="font-size:13px;font-weight:700;color:var(--down)">▼ ${Math.abs(s.p).toFixed(2)}%</span>
    </div>`;
  });
  html += `</div><div style="height:10px"></div>`;

  document.getElementById('notif-content').innerHTML = html;
}

let _quickAddStock = null;

function quickAddToHolding(code, name, suggestPrice){
  _quickAddStock = {code, name};
  document.getElementById('qa-stock-name').textContent = `加入庫存：${code} ${name}`;
  document.getElementById('qa-price').value = suggestPrice || '';
  document.getElementById('qa-qty').value = '1';
  document.getElementById('ov-quick-add').style.display='flex';
}

function closeQuickAdd(){
  document.getElementById('ov-quick-add').style.display='none';
  _quickAddStock = null;
}

function submitQuickAdd(){
  if(!_quickAddStock) return;
  const price = parseFloat(document.getElementById('qa-price').value);
  const qty = parseInt(document.getElementById('qa-qty').value);
  if(!price||!qty||isNaN(price)||isNaN(qty)){showToast('請填寫買入價和張數');return;}
  const holdings = loadHoldings();
  const idx = holdings.findIndex(h=>h.code===_quickAddStock.code);
  if(idx>=0) holdings[idx] = {..._quickAddStock, price, qty};
  else holdings.push({..._quickAddStock, price, qty});
  saveHoldings(holdings);
  closeQuickAdd();
  showToast(`✅ ${_quickAddStock.code} 已加入庫存`);
  updateNotifBadge();
  if(S.tab==='watchlist') renderWatchlist();
}

const PROXY = 'https://corsproxy.io/?';
const enc = encodeURIComponent;

// ─── 真實 IPO 資料（TWSE + TPEX 公開 API）───────────────────────
let _realIPO = [];

async function fetchRealIPO() {
  try {
    // 上市新股申購（TWSE Open API）
    const twseUrl = 'https://openapi.twse.com.tw/v1/announcement/publicStockInfo';
    const r1 = await fetch(PROXY + enc(twseUrl), {cache:'no-store'});
    const d1 = await r1.json();
    const twseIPO = (Array.isArray(d1) ? d1 : []).slice(0,8).map(x => ({
      code: x['公司代號'] || x.code || '',
      name: x['公司名稱'] || x.name || '',
      subPrice: parseFloat(x['申購價格'] || x.subPrice || 0),
      start: x['申購起日'] || '',
      end: x['申購截止日'] || x['申購迄日'] || '',
      mkPrice: parseFloat(x['承銷價'] || x['市價'] || 0) || 0,
      status: calcIPOStatus(x['申購起日']||'', x['申購截止日']||x['申購迄日']||''),
      diff: 0,
      pct: 0,
      qty: parseInt(x['承銷股數']||'0')/1000 || 0,
    }));
    if(twseIPO.length > 0) {
      _realIPO = twseIPO;
      return true;
    }
  } catch(e) { console.log('IPO API error:', e.message); }
  return false;
}

function calcIPOStatus(startStr, endStr) {
  if(!startStr || !endStr) return 'closed';
  try {
    const now = new Date();
    // 格式：20260522
    const fmt = s => new Date(s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8));
    const start = fmt(startStr.replace(/\//g,''));
    const end = fmt(endStr.replace(/\//g,''));
    if(now < start) return 'waiting';
    if(now > end) return 'closed';
    return 'going';
  } catch(e) { return 'closed'; }
}

// ─── 真實新聞（Yahoo Finance）────────────────────────────────────
let _realNews = [];

async function fetchRealNews() {
  try {
    // Yahoo Finance 台股新聞搜尋
    const url = 'https://query1.finance.yahoo.com/v1/finance/search?q=%E5%8F%B0%E8%82%A1&newsCount=12&lang=zh-TW&region=TW';
    const r = await fetch(PROXY + enc(url), {cache:'no-store'});
    const d = await r.json();
    const news = d?.news || [];
    if(news.length > 0) {
      _realNews = news.map(n => ({

        title: n.title,
        url: n.link || '',
      }));
      return true;
    }
  } catch(e) { console.log('News API error:', e.message); }
  return false;
}

let _realUS = [];

async function fetchRealUSStocks() {
  try {
    const symbols = 'NVDA,TSM,AAPL,MSFT,AMZN,META,TSLA,QCOM,AMD,ARM';
    const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}&lang=zh-TW&region=TW`;
    const r = await fetch(PROXY + enc(url), {cache:'no-store'});
    const d = await r.json();
    const quotes = d?.quoteResponse?.result || [];
    if(quotes.length > 0) {
      _realUS = quotes.map(q => ({
        code: q.symbol,
        name: q.shortName || q.longName || q.symbol,
        price: q.regularMarketPrice,
        yield_pct: (q.trailingAnnualDividendYield||0)*100,
        ret: q.fiftyTwoWeekChangePercent||0,
        d: q.regularMarketChange||0,
        p: q.regularMarketChangePercent||0,
      }));
      return true;
    }
  } catch(e) {}
  return false;
}

// ─── 真實國際指數（Yahoo Finance）────────────────────────────────
let _realIndices = {};

async function fetchRealIndices() {
  try {
    const symbols = '^TWII,^TWOII,^DJI,^IXIC,^SOX,GC=F,CL=F,^FTSE,^GDAXI,^N225,^HSI';
    const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${enc(symbols)}&lang=zh-TW`;
    const r = await fetch(PROXY + enc(url), {cache:'no-store'});
    const d = await r.json();
    const quotes = d?.quoteResponse?.result || [];
    quotes.forEach(q => { _realIndices[q.symbol] = q; });
    if(quotes.length > 0) return true;
  } catch(e) {}
  return false;
}

function getRealIndex(symbol) {
  const q = _realIndices[symbol];
  if(!q) return null;
  return { v: q.regularMarketPrice, d: q.regularMarketChange||0, p: q.regularMarketChangePercent||0 };
}

// ─── 真實盤中K線（Yahoo Finance）────────────────────────────────
async function fetchIntradayChart() {
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/%5ETWII?interval=1m&range=1d`;
    const r = await fetch(PROXY + enc(url), {cache:'no-store'});
    const d = await r.json();
    const result = d?.chart?.result?.[0];
    if(!result) return false;
    const closes = result.indicators?.quote?.[0]?.close || [];
    const valid = closes.filter(v => v != null && !isNaN(v));
    if(valid.length > 5) {
      S.intradayData = valid;
      S.idx.taiex.v = valid[valid.length-1];
      const prev = result.meta?.previousClose || valid[0];
      S.idx.taiex.d = +(S.idx.taiex.v - prev).toFixed(2);
      S.idx.taiex.p = +(S.idx.taiex.d/prev*100).toFixed(2);
      if(S.tab==='selection' && S.cat.selection==='台股') requestAnimationFrame(drawChart);
      return true;
    }
  } catch(e) {}
  return false;
}

// 專門抓持股最新價格
async function fetchHoldingsPrices() {
  const holdings = loadHoldings();
  if(!holdings.length) return;

  // 組成 Yahoo Finance 查詢（台股加 .TW，ETF 也一樣）
  const symbols = holdings.map(h => {
    // 純數字代號 → 台股 .TW；英文代號 → 直接查
    return /^\d+/.test(h.code) ? h.code+'.TW' : h.code;
  }).join(',');

  try {
    const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(symbols)}&lang=zh-TW&region=TW`;
    const r = await fetch(PROXY + encodeURIComponent(url), {cache:'no-store'});
    const d = await r.json();
    const quotes = d?.quoteResponse?.result || [];

    quotes.forEach(q => {
      const code = q.symbol.replace(/\.(TW|TWO)$/, '');
      // 更新 S.stocks 裡的對應股票
      let st = S.stocks.find(s => s.code === code);
      if(!st) {
        // 如果 S.stocks 裡沒有這支，新增進去
        st = { code, name: q.shortName || q.longName || code, price: 0, d: 0, p: 0 };
        S.stocks.push(st);
      }
      if(q.regularMarketPrice) {
        st.price = Math.round(q.regularMarketPrice * 100) / 100;
        st.d = Math.round((q.regularMarketChange || 0) * 100) / 100;
        st.p = Math.round((q.regularMarketChangePercent || 0) * 100) / 100;
      }
    });
    return true;
  } catch(e) {
    console.log('fetchHoldingsPrices error:', e.message);
    return false;
  }
}

// 覆寫 renderMyHoldings — 版面完全比照截圖
window.renderMyHoldings = function() {
  const holdings = loadHoldings();

  if(!holdings.length) return `
    <div class="empty-state">
      <div class="empty-illus">
        <svg width="40" height="36" viewBox="0 0 40 36" fill="none">
          <rect x="4" y="8" width="32" height="24" rx="3" stroke="var(--dim)" stroke-width="2"/>
          <rect x="4" y="8" width="32" height="6" rx="3" stroke="var(--dim)" stroke-width="2"/>
        </svg>
      </div>
      <div class="empty-txt">尚未設定庫存</div>
      <div class="empty-sub">點下方「＋ 新增持股」開始設定</div>
    </div>
    <div style="padding:0 14px 16px">
      <button onclick="openAddHolding()" style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:15px;color:var(--muted);cursor:pointer;font-family:inherit">
        ＋ 新增持股
      </button>
    </div>`;

  // 計算總市值
  let totalCost = 0, totalVal = 0;
  const rows = holdings.map(h => {
    const live = S.stocks.find(s => s.code === h.code);
    const curPrice = (live && live.price > 0) ? live.price : h.price;
    const cost = h.price * h.qty * 1000;
    const val  = curPrice * h.qty * 1000;
    const pnl  = val - cost;
    const pct  = cost > 0 ? (pnl / cost * 100) : 0;
    totalCost += cost;
    totalVal  += val;
    return { h, curPrice, cost, val, pnl, pct, live };
  });
  const totalPnl = totalVal - totalCost;
  const totalPct = totalCost > 0 ? (totalPnl / totalCost * 100) : 0;

  return `
    <!-- 總市值 -->
    <div style="padding:12px 14px 10px;border-bottom:1px solid var(--border)">
      <div style="font-size:12px;color:var(--muted);margin-bottom:4px">台股庫存總市值 (TWD)</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end">
        <div>
          <div style="font-size:26px;font-weight:800;color:var(--text)">
            ${Math.round(totalVal).toLocaleString('zh-TW')}
          </div>
          <div style="font-size:13px;color:${totalPnl>=0?'var(--up)':'var(--down)'};margin-top:2px">
            ${totalPnl>=0?'▲':'▼'} ${Math.abs(Math.round(totalPnl)).toLocaleString('zh-TW')} (${totalPct>=0?'+':''}${totalPct.toFixed(2)}%)
          </div>
        </div>
        <button onclick="refreshHoldings()" style="background:none;border:none;cursor:pointer;padding:6px;color:var(--muted)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
    </div>

    <!-- 各持股 -->
    ${rows.map(({h, curPrice, pnl, pct, val, live}) => `
    <div style="padding:14px;border-bottom:1px solid var(--border)">
      <!-- 代號 + 名稱 + 損益 -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <span style="font-size:17px;font-weight:800;color:var(--text)">${h.code}</span>
          <span style="font-size:13px;color:var(--muted);margin-left:8px">${h.name}</span>
        </div>
        <div style="text-align:right">
          <div style="font-size:20px;font-weight:800;color:${pnl>=0?'var(--up)':'var(--down)'}">
            ${pnl>=0?'+':''}${Math.round(pnl).toLocaleString('zh-TW')}
          </div>
          <div style="font-size:13px;color:${pnl>=0?'var(--up)':'var(--down)'};margin-top:1px">
            報酬 ${pct>=0?'+':''}${pct.toFixed(2)}%
          </div>
        </div>
      </div>
      <!-- 持有 / 均買價 / 現價 -->
      <div style="display:flex;gap:20px;margin-bottom:10px">
        <div>
          <div style="font-size:11px;color:var(--muted)">持有</div>
          <div style="font-size:14px;color:var(--text);font-weight:600">${h.qty}張</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--muted)">均買價</div>
          <div style="font-size:14px;color:var(--text);font-weight:600">${h.price.toFixed(2)}</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--muted)">現價</div>
          <div style="font-size:14px;font-weight:700;color:${(live&&live.d>=0)?'var(--up)':'var(--down)'}">
            ${curPrice.toFixed(2)}
          </div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--muted)">市值</div>
          <div style="font-size:13px;color:var(--muted)">${Math.round(val).toLocaleString()}</div>
        </div>
      </div>
      <!-- 下單 / 刪除 -->
      <div style="display:flex;gap:8px">
        <button onclick="openOrderForStock('${h.code}')"
          style="flex:1;background:transparent;border:1px solid var(--orange);border-radius:8px;padding:11px;font-size:14px;font-weight:700;color:var(--orange);cursor:pointer;font-family:inherit">
          下單
        </button>
        <button onclick="deleteHolding('${h.code}')"
          style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:11px 18px;font-size:14px;color:var(--muted);cursor:pointer;font-family:inherit">
          刪除
        </button>
      </div>
    </div>`).join('')}

    <div style="height:24px"></div>`;
};

// 新增後立即刷新（先存，再抓價格，再更新畫面）
const _origSubmitAdd = submitAddHolding;
window.submitAddHolding = async function() {
  const code = document.getElementById('ah-code')?.value?.trim()?.toUpperCase();
  const name = document.getElementById('ah-name')?.value?.trim();
  const price = parseFloat(document.getElementById('ah-price')?.value);
  const qty   = parseInt(document.getElementById('ah-qty')?.value);
  if(!code || !price || !qty || isNaN(price) || isNaN(qty)) {
    showToast('請填寫所有欄位'); return;
  }
  const holdings = loadHoldings();
  const idx = holdings.findIndex(h => h.code === code);
  if(idx >= 0) holdings[idx] = { code, name: name||code, price, qty };
  else holdings.push({ code, name: name||code, price, qty });
  saveHoldings(holdings);
  closeAddHolding();
  showToast('✅ 已儲存，正在更新現價...');

  // 立即抓新持股的最新價格
  await fetchHoldingsPrices();

  // 刷新庫存畫面
  if(S.tab === 'watchlist') {
    const list = document.getElementById('hold-list');
    if(list) list.innerHTML = renderMyHoldings();
  }
  updateNotifBadge();
  showToast(`✅ ${code} 已加入庫存，現價已更新`);
};

// 更新按鈕 / 手動刷新庫存
async function refreshHoldings() {
  showToast('🔄 正在抓取最新現價...');
  await fetchHoldingsPrices();
  const list = document.getElementById('hold-list');
  if(list) list.innerHTML = renderMyHoldings();
  showToast('✅ 現價已更新');
}

// 切換到庫存 Tab 時自動抓價格
const _origSwitchHoldTab = switchHoldTab;
window.switchHoldTab = async function(t) {
  S.holdTab = t;
  document.querySelectorAll('#hold-tabs .sub-tab').forEach(b =>
    b.classList.toggle('active', b.textContent.trim() === t));
  const list = document.getElementById('hold-list');
  if(!list) return;
  if(t === '庫存') {
    list.innerHTML = `<div style="text-align:center;padding:30px;color:var(--muted)">⏳ 更新現價中...</div>`;
    await fetchHoldingsPrices();
    list.innerHTML = renderMyHoldings();
  } else {
    const stocks = S.stocks.slice(0, t==='豐存股 Top10' ? 10 : 8);
    list.innerHTML = stocks.map(s => renderStockRowWithAdd(s)).join('');
  }
};

// 自動每 30 秒刷新持股現價（盤中）
setInterval(async () => {
  if(isTradingHours()) {
    const didFetch = await fetchHoldingsPrices();
    if(didFetch && S.tab === 'watchlist' && S.holdTab === '庫存') {
      const list = document.getElementById('hold-list');
      if(list) list.innerHTML = renderMyHoldings();
    }
  }
}, 30000);

function confirmClearAll(){
  closeHoldSettings();
  // 用 confirm 替代 Alert
  setTimeout(()=>{
    if(confirm('確定要清除全部庫存？此動作無法復原。')){
      saveHoldings([]);
      const list = document.getElementById('hold-list');
      if(list) list.innerHTML = renderMyHoldings();
      showToast('✅ 已清除全部庫存');
    }
  }, 300);
}

// ── 隱藏新增按鈕（連點3下觸發）────────────────────────────────
let _secretTaps = 0, _secretTimer = null;
function handleSecretTap() {
  _secretTaps++;
  clearTimeout(_secretTimer);
  if(_secretTaps >= 3) {
    _secretTaps = 0;
    openAddHolding();
    // 短暫閃爍提示
    const btn = document.getElementById('hold-secret-btn');
    if(btn){ btn.style.background='var(--orange)'; setTimeout(()=>btn.style.background='var(--border)',400); }
  } else {
    _secretTimer = setTimeout(()=>{ _secretTaps=0; }, 600);
  }
}

  <div style="display:flex;border-bottom:1px solid var(--border)">
    <button class="smart-tab active sub-tab" style="flex:1;border-radius:0" onclick="smartSwitchTab('漲幅排行',this)">漲幅排行</button>
    <button class="smart-tab sub-tab" style="flex:1;border-radius:0" onclick="smartSwitchTab('跌幅排行',this)">跌幅排行</button>
    <button class="smart-tab sub-tab" style="flex:1;border-radius:0" onclick="smartSwitchTab('高價股',this)">高價股</button>
  </div>
  <div id="smart-list" style="flex:1;overflow-y:auto;padding-bottom:20px"></div>
</div>

<!-- ══ 類股報價 ══ -->
<div class="full-page fp-dark" id="page-sector">
  <div class="fp-header dark">
    <button class="fp-back" onclick="closePage('page-sector')">←</button>
    <span class="fp-title">類股報價</span>
    <button class="fp-icon" onclick="fetchSectorData().then(renderSectorPage)">🔄</button>
  </div>
  <div style="padding:6px 14px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">
    以各族群代表 ETF 報價為準，即時更新
  </div>
  <div id="sector-list" style="flex:1;overflow-y:auto;padding-bottom:20px"></div>
</div>

<!-- ══ 盤後分析 ══ -->
<div class="full-page fp-dark" id="page-postmarket">
  <div class="fp-header dark">
    <button class="fp-back" onclick="closePage('page-postmarket')">←</button>
    <span class="fp-title">盤後分析</span>
    <button class="fp-icon" onclick="openPostMarketPage()">🔄</button>
  </div>
  <div id="postmarket-content" style="flex:1;overflow-y:auto;padding-bottom:20px"></div>
</div>

<!-- ══ 理財新聞 ══ -->
<div class="full-page fp-dark" id="page-news">
  <div class="fp-header dark">
    <button class="fp-back" onclick="closePage('page-news')">←</button>
    <span class="fp-title">理財新聞</span>
    <button class="fp-icon" onclick="fetchRealNews().then(()=>document.getElementById('finance-news-list').innerHTML=renderNews7x24())">🔄</button>
  </div>
  <div id="finance-news-list" style="flex:1;overflow-y:auto;padding-bottom:20px"></div>
</div>


<!-- ══ 庫存設定面板 ══ -->
<div id="ov-hold-settings" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;flex-direction:column;justify-content:flex-end;align-items:center">
  <div style="background:var(--card);border-radius:20px 20px 0 0;padding:20px 0 40px;width:100%;max-width:430px">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:0 18px 16px;border-bottom:1px solid var(--border)">
      <span style="font-size:16px;font-weight:700;color:var(--text)">庫存設定</span>
      <button onclick="closeHoldSettings()" style="background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer">✕</button>
    </div>

    <!-- 新增持股 -->
    <div onclick="closeHoldSettings();openAddHolding();"
      style="display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer;border-bottom:1px solid var(--border)">
      <div style="width:40px;height:40px;background:#1e2a1e;border-radius:10px;display:flex;align-items:center;justify-content:center">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
      </div>
      <div>
        <div style="font-size:15px;font-weight:600;color:var(--text)">新增持股</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">輸入代號、均買價、張數</div>
      </div>
      <svg style="margin-left:auto" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--dim)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </div>

    <!-- 更新現價 -->
    <div onclick="closeHoldSettings();refreshHoldings();"
      style="display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer;border-bottom:1px solid var(--border)">
      <div style="width:40px;height:40px;background:#1a1a2e;border-radius:10px;display:flex;align-items:center;justify-content:center">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4d7ef5" stroke-width="2" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </div>
      <div>
        <div style="font-size:15px;font-weight:600;color:var(--text)">更新現價</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">重新抓取所有持股最新報價</div>
      </div>
      <svg style="margin-left:auto" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--dim)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </div>

    <!-- 顯示/隱藏損益 -->
    <div onclick="toggleHoldPnlDisplay(this)"
      style="display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer;border-bottom:1px solid var(--border)">
      <div style="width:40px;height:40px;background:#1a1500;border-radius:10px;display:flex;align-items:center;justify-content:center">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </div>
      <div>
        <div style="font-size:15px;font-weight:600;color:var(--text)">顯示損益金額</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">開啟/關閉損益數字顯示</div>
      </div>
      <div id="hold-pnl-toggle" style="width:44px;height:24px;background:var(--orange);border-radius:12px;position:relative;margin-left:auto;transition:.2s">
        <div style="width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:2px;right:2px;transition:.2s"></div>
      </div>
    </div>

    <!-- 清除全部庫存 -->
    <div onclick="confirmClearAll()"
      style="display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer">
      <div style="width:40px;height:40px;background:#2a1010;border-radius:10px;display:flex;align-items:center;justify-content:center">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--up)" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </div>
      <div>
        <div style="font-size:15px;font-weight:600;color:var(--up)">清除全部庫存</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">刪除所有持股紀錄</div>
      </div>
      <svg style="margin-left:auto" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--dim)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </div>

  </div>
</div>

</body>
</html>
